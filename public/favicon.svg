<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0f0f1a"/>
  <!-- Gamepad body -->
  <rect x="4" y="11" width="24" height="12" rx="4" fill="#6c63ff"/>
  <!-- D-pad left -->
  <rect x="7" y="15" width="3" height="3" fill="#1a1a2e"/>
  <!-- D-pad right -->
  <rect x="13" y="15" width="3" height="3" fill="#1a1a2e"/>
  <!-- D-pad up -->
  <rect x="10" y="12" width="3" height="3" fill="#1a1a2e"/>
  <!-- D-pad down -->
  <rect x="10" y="18" width="3" height="3" fill="#1a1a2e"/>
  <!-- Button A (red) -->
  <rect x="22" y="15" width="3" height="3" fill="#ff6b6b"/>
  <!-- Button B (yellow) -->
  <rect x="19" y="12" width="3" height="3" fill="#ffd93d"/>
  <!-- Center button -->
  <rect x="15" y="15" width="3" height="3" rx="1" fill="#e0e0e0"/>
</svg>
