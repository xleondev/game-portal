<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="70%" stop-color="#06102e"/>
      <stop offset="100%" stop-color="#0a1a06"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5c1e"/>
      <stop offset="100%" stop-color="#0a2a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <rect x="14"  y="12"  width="2" height="2" fill="#fff" opacity="0.9"/>
  <rect x="42"  y="28"  width="2" height="2" fill="#fff" opacity="0.6"/>
  <rect x="78"  y="8"   width="2" height="2" fill="#fff" opacity="0.8"/>
  <rect x="110" y="38"  width="2" height="2" fill="#fff" opacity="0.7"/>
  <rect x="148" y="16"  width="2" height="2" fill="#fff" opacity="0.9"/>
  <rect x="190" y="30"  width="2" height="2" fill="#fff" opacity="0.5"/>
  <rect x="226" y="10"  width="2" height="2" fill="#fff" opacity="0.8"/>
  <rect x="262" y="42"  width="2" height="2" fill="#fff" opacity="0.7"/>
  <rect x="298" y="18"  width="2" height="2" fill="#fff" opacity="0.9"/>
  <rect x="334" y="34"  width="2" height="2" fill="#fff" opacity="0.6"/>
  <rect x="374" y="12"  width="2" height="2" fill="#fff" opacity="0.8"/>
  <rect x="22"  y="54"  width="2" height="2" fill="#fff" opacity="0.5"/>
  <rect x="64"  y="62"  width="2" height="2" fill="#fff" opacity="0.7"/>
  <rect x="130" y="48"  width="2" height="2" fill="#fff" opacity="0.6"/>
  <rect x="182" y="58"  width="2" height="2" fill="#fff" opacity="0.8"/>
  <rect x="246" y="66"  width="2" height="2" fill="#fff" opacity="0.5"/>
  <rect x="310" y="52"  width="2" height="2" fill="#fff" opacity="0.7"/>
  <rect x="386" y="44"  width="2" height="2" fill="#fff" opacity="0.9"/>
  <rect x="54"  y="84"  width="2" height="2" fill="#fff" opacity="0.4"/>
  <rect x="160" y="80"  width="2" height="2" fill="#fff" opacity="0.6"/>
  <rect x="350" y="76"  width="2" height="2" fill="#fff" opacity="0.5"/>

  <!-- Planet with rings -->
  <circle cx="348" cy="70" r="28" fill="#2a1040"/>
  <ellipse cx="348" cy="70" rx="28" ry="28" fill="#3a1858"/>
  <!-- Planet surface detail -->
  <ellipse cx="338" cy="60" rx="10" ry="7" fill="#4a2268" opacity="0.6"/>
  <ellipse cx="356" cy="74" rx="7" ry="5" fill="#4a2268" opacity="0.4"/>
  <!-- Rings -->
  <ellipse cx="348" cy="70" rx="46" ry="10" fill="none" stroke="#7a4aaa" stroke-width="3" opacity="0.7"/>
  <ellipse cx="348" cy="70" rx="52" ry="12" fill="none" stroke="#5a2a8a" stroke-width="2" opacity="0.4"/>

  <!-- Ground -->
  <rect x="0" y="224" width="400" height="76" fill="url(#ground)"/>
  <!-- Ground top edge (pixel line) -->
  <rect x="0" y="224" width="400" height="4" fill="#2a8a2a"/>
  <rect x="0" y="228" width="400" height="2" fill="#3aaa3a" opacity="0.5"/>

  <!-- Ground surface details -->
  <rect x="30"  y="228" width="20" height="4" fill="#1a4a1a"/>
  <rect x="100" y="228" width="14" height="4" fill="#1a4a1a"/>
  <rect x="180" y="228" width="24" height="4" fill="#1a4a1a"/>
  <rect x="280" y="228" width="16" height="4" fill="#1a4a1a"/>
  <rect x="350" y="228" width="20" height="4" fill="#1a4a1a"/>

  <!-- === ASTRONAUT (pixel art, running pose) === -->
  <!-- Helmet -->
  <rect x="64"  y="152" width="32" height="32" fill="#cccccc" rx="6"/>
  <!-- Helmet highlight -->
  <rect x="64"  y="152" width="32" height="4"  fill="#eeeeee" rx="4"/>
  <!-- Visor -->
  <rect x="68"  y="158" width="22" height="16" fill="#66aaff" rx="3"/>
  <!-- Visor shine -->
  <rect x="70"  y="160" width="6"  height="5"  fill="#aaddff" rx="1" opacity="0.9"/>
  <!-- Visor inner reflection -->
  <rect x="78"  y="164" width="4"  height="4"  fill="#88ccff" opacity="0.6"/>
  <!-- Helmet band -->
  <rect x="64"  y="178" width="32" height="6"  fill="#bbbbbb"/>

  <!-- Body / suit -->
  <rect x="66"  y="184" width="28" height="28" fill="#dddddd"/>
  <!-- Suit chest panel -->
  <rect x="70"  y="188" width="18" height="10" fill="#aaaaaa" rx="1"/>
  <rect x="72"  y="190" width="6"  height="6"  fill="#cc4444" rx="1"/>
  <rect x="80"  y="190" width="6"  height="6"  fill="#44cc44" rx="1"/>

  <!-- Jetpack (on back/right) -->
  <rect x="94"  y="186" width="12" height="20" fill="#888888" rx="3"/>
  <rect x="96"  y="204" width="4"  height="4"  fill="#ff6600" rx="1"/>
  <rect x="101" y="204" width="4"  height="4"  fill="#ff8800" rx="1"/>
  <!-- Jetpack thruster flame -->
  <rect x="97"  y="208" width="3"  height="6"  fill="#ffaa00" opacity="0.9"/>
  <rect x="101" y="208" width="3"  height="4"  fill="#ff6600" opacity="0.8"/>

  <!-- Left arm (forward, slightly up) -->
  <rect x="44"  y="186" width="24" height="10" fill="#dddddd" rx="5"/>
  <rect x="40"  y="188" width="10" height="8"  fill="#cccccc" rx="4"/>

  <!-- Right arm (back) -->
  <rect x="90"  y="196" width="16" height="8"  fill="#cccccc" rx="4"/>

  <!-- Left leg (forward/up — running stride) -->
  <rect x="66"  y="210" width="12" height="16" fill="#dddddd"/>
  <!-- Left boot -->
  <rect x="60"  y="220" width="16" height="8"  fill="#cccccc" rx="2"/>

  <!-- Right leg (back/down) -->
  <rect x="80"  y="210" width="12" height="18" fill="#cccccc"/>
  <!-- Right boot -->
  <rect x="78"  y="220" width="16" height="8"  fill="#bbbbbb" rx="2"/>

  <!-- Speed lines -->
  <rect x="8"   y="192" width="44" height="3" fill="#ffffff" opacity="0.15"/>
  <rect x="4"   y="202" width="36" height="2" fill="#ffffff" opacity="0.10"/>
  <rect x="12"  y="212" width="40" height="3" fill="#ffffff" opacity="0.12"/>

  <!-- === ASTEROID (obstacle, mid-air) === -->
  <g transform="translate(272, 162)">
    <rect x="-18" y="-10" width="36" height="20" fill="#8a7a6a" rx="6"/>
    <rect x="-12" y="-16" width="24" height="12" fill="#8a7a6a" rx="4"/>
    <rect x="-14" y="6"  width="28" height="10" fill="#7a6a5a" rx="4"/>
    <!-- Craters -->
    <rect x="-6"  y="-6"  width="6" height="6" fill="#6a5a4a" rx="2"/>
    <rect x="4"   y="0"   width="5" height="5" fill="#6a5a4a" rx="1"/>
    <rect x="-10" y="2"   width="4" height="4" fill="#6a5a4a" rx="1"/>
    <!-- Highlight -->
    <rect x="-14" y="-12" width="12" height="4" fill="#aaa090" rx="2" opacity="0.6"/>
  </g>

  <!-- Small asteroid -->
  <g transform="translate(330, 185)">
    <rect x="-10" y="-8" width="20" height="16" fill="#7a6a5a" rx="4"/>
    <rect x="-4"  y="-4" width="5"  height="5"  fill="#5a4a3a" rx="1"/>
    <rect x="-8"  y="-10" width="10" height="5"  fill="#9a8a7a" rx="2" opacity="0.5"/>
  </g>

  <!-- === COINS (collectible row) === -->
  <g>
    <!-- Coin 1 -->
    <circle cx="160" cy="178" r="9" fill="#cc8800"/>
    <circle cx="160" cy="178" r="7" fill="#ffcc00"/>
    <circle cx="160" cy="178" r="4" fill="#ffdd44"/>
    <text x="160" y="182" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#aa6600">C</text>
    <!-- Coin 2 -->
    <circle cx="184" cy="178" r="9" fill="#cc8800"/>
    <circle cx="184" cy="178" r="7" fill="#ffcc00"/>
    <circle cx="184" cy="178" r="4" fill="#ffdd44"/>
    <text x="184" y="182" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#aa6600">C</text>
    <!-- Coin 3 -->
    <circle cx="208" cy="178" r="9" fill="#cc8800"/>
    <circle cx="208" cy="178" r="7" fill="#ffcc00"/>
    <circle cx="208" cy="178" r="4" fill="#ffdd44"/>
    <text x="208" y="182" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#aa6600">C</text>
    <!-- Coin shimmer lines -->
    <rect x="156" y="174" width="2" height="2" fill="#fff" opacity="0.6"/>
    <rect x="180" y="174" width="2" height="2" fill="#fff" opacity="0.6"/>
    <rect x="204" y="174" width="2" height="2" fill="#fff" opacity="0.6"/>
  </g>

  <!-- === HUD / SCORE === -->
  <rect x="290" y="90" width="102" height="40" fill="#000000" opacity="0.55" rx="4"/>
  <text x="298" y="107" font-family="monospace" font-size="11" fill="#aaaaaa" letter-spacing="1">SCORE</text>
  <text x="298" y="124" font-family="monospace" font-size="16" font-weight="bold" fill="#ffcc00" letter-spacing="2">024680</text>

  <!-- Zone badge -->
  <rect x="8" y="90" width="156" height="20" fill="#000000" opacity="0.55" rx="4"/>
  <rect x="10" y="92" width="4" height="16" fill="#aaffaa" rx="1"/>
  <text x="20" y="104" font-family="monospace" font-size="10" fill="#aaffaa" letter-spacing="1">ZONE 1: ASTEROID BELT</text>

  <!-- === TITLE === -->
  <!-- Title shadow -->
  <text x="202" y="58" text-anchor="middle" font-family="monospace" font-size="34" font-weight="bold" fill="#000000" letter-spacing="5" opacity="0.5">ASTRO DASH</text>
  <!-- Title main -->
  <text x="200" y="56" text-anchor="middle" font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="5">ASTRO DASH</text>
  <!-- Subtitle -->
  <text x="200" y="76" text-anchor="middle" font-family="monospace" font-size="11" fill="#88aaff" letter-spacing="3">8-BIT ENDLESS RUNNER</text>
</svg>
